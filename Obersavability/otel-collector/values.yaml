mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
    resource:
      attributes:
        - key: deployment.environment
          value: production
          action: upsert

  exporters:
    prometheusremotewrite:
      endpoint: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
      tls:
        insecure: true
    loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      tls:
        insecure: true
    otlp/newrelic:
      endpoint: otlp.nr-data.net:4317
      headers:
        api-key: ${NEW_RELIC_API_KEY}

  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [resource, batch]
        exporters: [prometheusremotewrite, otlp/newrelic]
      logs:
        receivers: [otlp]
        processors: [resource, batch]
        exporters: [loki, otlp/newrelic]
      traces:
        receivers: [otlp]
        processors: [resource, batch]
        exporters: [otlp/newrelic]
