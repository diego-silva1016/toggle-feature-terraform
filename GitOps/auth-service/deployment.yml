apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 246325869534.dkr.ecr.us-east-1.amazonaws.com/auth-service:sha-fb8f5b84b06c
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        - name: OTEL_SERVICE_NAME
          value: auth-service
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.namespace=auth-service
        - name: OTEL_EXPORTER_OTLP_HEADERS
          valueFrom:
            secretKeyRef:
              name: auth-service-secret
              key: OTEL_EXPORTER_OTLP_HEADERS
        envFrom:
        - secretRef:
            name: auth-service-secret
        startupProbe:
          httpGet:
            path: /health
            port: 8001
          periodSeconds: 5
          failureThreshold: 6
